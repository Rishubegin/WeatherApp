<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/clouds.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Project</title>

    <style>
      html,
      body {
        overscroll-behavior: none;
      }

      /* * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      } */

      body {
        /* height: 100vh; */
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #87ceeb, #d9f2ff);
        font-family: "Poppins", sans-serif;
      }

      .loader-container {
        text-align: center;
      }

      .cloud {
        position: relative;
        width: 130px;
        height: 70px;
        margin: 0 auto 30px;
        animation: float 2.5s ease-in-out infinite;
      }

      .cloud-part {
        position: absolute;
        background: white;
        border-radius: 50%;
      }

      .cloud-left {
        width: 55px;
        height: 55px;
        left: 10px;
        top: 18px;
      }

      .cloud-center {
        width: 75px;
        height: 75px;
        left: 35px;
        top: 0;
      }

      .cloud-right {
        width: 55px;
        height: 55px;
        left: 75px;
        top: 18px;
      }

      .cloud::after {
        content: "";
        position: absolute;
        width: 110px;
        height: 40px;
        left: 10px;
        bottom: 0;
        background: white;
        border-radius: 30px;
      }

      .title {
        font-size: 2rem;
        color: #1f2937;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .loading {
        font-size: 1.1rem;
        color: #4b5563;
        font-weight: 500;
      }

      .loading span {
        animation: blink 1.5s infinite;
      }

      .loading span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-12px);
        }
      }

      @keyframes blink {
        0%,
        20% {
          opacity: 0;
        }

        50% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="loader-container">
      <div class="cloud">
        <div class="cloud-part cloud-left"></div>
        <div class="cloud-part cloud-center"></div>
        <div class="cloud-part cloud-right"></div>
      </div>

      <h1 class="title">Cloud Cast</h1>

      <p class="loading">
        Loading
        <span>.</span><span>.</span><span>.</span>
      </p>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
